services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ala
      POSTGRES_PASSWORD: ala
      POSTGRES_DB: ala
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ala -d ala']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://ala:ala@postgres:5432/ala?schema=public
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker-local-only-access-secret-32-characters-min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-docker-local-only-refresh-secret-32-characters-min}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://ala:ala@postgres:5432/ala?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker-local-only-access-secret-32-characters-min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-docker-local-only-refresh-secret-32-characters-min}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
